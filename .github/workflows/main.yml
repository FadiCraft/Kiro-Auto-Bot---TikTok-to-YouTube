name: Kiro Auto Bot - TikTok to YouTube

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          # تثبيت المكتبات مع تحديث الـ PIP أولاً
          python -m pip install --upgrade pip
          pip install -U yt-dlp[curl_cffi] 
          # ملاحظة: تم إضافة [curl_cffi] مباشرة مع yt-dlp لضمان الربط

      - name: Install Node Modules
        run: npm install googleapis

      - name: Run Kiro Bot
        run: node index.js

      - name: Save and Push History
        run: |
          git config --global user.name "Kiro Bot"
          git config --global user.email "bot@kirozozo.com"
          git add history.json
          git commit -m "Update history.json [skip ci]" || echo "No changes"
          git push
